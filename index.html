<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UI/UX Designer</title>

  <!-- Tailwind (CDN for prototyping) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom animations + reduced motion -->
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 1s ease forwards;
    }
    @media (prefers-reduced-motion: reduce) {
      .animate-fade-in-up { animation: none !important; }
      .transition { transition: none !important; }
    }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-white text-slate-900">
  <!-- Skip link for keyboard users -->
  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:p-2 focus:bg-white focus:outline-none focus:ring-2 focus:ring-violet-500">
    Skip to content
  </a>

  <!-- Hero -->
  <header class="text-center py-24 bg-gradient-to-br from-[#5D00FF] to-[#831DC3]">
    <div class="container mx-auto px-4">
      <h1 class="text-white text-4xl md:text-6xl font-bold mb-3 opacity-0 animate-fade-in-up" style="animation-delay:.5s">
        Lisa Nguyen
      </h1>
      <p class="text-violet-50 text-lg md:text-xl opacity-0 animate-fade-in-up" style="animation-delay:.7s">
        UI/UX Designer · Crafting accessible, user-friendly experiences
      </p>
    </div>
  </header>

  <!-- Main -->
  <main id="main" class="flex-1">
    <!-- My Work -->
    <section id="projects" class="container mx-auto px-4 text-center my-12 opacity-0 animate-fade-in-up" style="animation-delay:1.1s">
      <h2 class="text-3xl md:text-4xl font-semibold mb-3 text-slate-900">
        My Work
      </h2>
      <p class="text-slate-700 max-w-2xl mx-auto">
        Projects coming soon. Check back here for live case studies.
      </p>
      <div class="mt-6 inline-block rounded-full bg-slate-700 text-white px-3 py-1 text-sm font-medium">
        Coming Soon
      </div>
    </section>
  </main>

  <!-- Footer (optional) -->
  <footer class="py-8 text-center text-sm text-slate-600">
    © <span id="year"></span> Lisa Nguyen
  </footer>

  <script>
    // small enhancement
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
